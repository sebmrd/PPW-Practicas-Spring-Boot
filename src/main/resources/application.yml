spring:
  profiles:
    active: dev
  application:
    name: pwp67-api
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
server:
  servlet:
    context-path: /api
  error:
    include-message: always
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
