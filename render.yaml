services:
  - type: web
    name: fundamentos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: validate
      - key: JPA_SHOW_SQL
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "1800000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: JWT_ISSUER
        value: fundamentos01-api
      - key: ROOT_LOG_LEVEL
        value: WARN
      - key: APP_LOG_LEVEL
        value: INFO
        